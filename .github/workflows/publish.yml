name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from release tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test WS.DomainModelling.Test/WS.DomainModelling.Test.csproj --configuration Release --no-restore

      - name: Pack WS.DomainModelling.Common
        run: dotnet pack WS.DomainModelling.Common/WS.DomainModelling.Common.csproj --configuration Release --no-restore -p:VersionPrefix=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Pack WS.DomainModelling
        run: dotnet pack WS.DomainModelling/WS.DomainModelling.csproj --configuration Release --no-restore -p:VersionPrefix=${{ steps.version.outputs.VERSION }} --output ./nupkgs

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
