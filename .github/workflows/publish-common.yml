name: Publish WS.DomainModelling.Common to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.14)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore WS.DomainModelling.Common/WS.DomainModelling.Common.csproj

      - name: Build
        run: dotnet build WS.DomainModelling.Common/WS.DomainModelling.Common.csproj --configuration Release --no-restore -p:VersionPrefix=${{ inputs.version }}

      - name: Run tests
        run: dotnet test WS.DomainModelling.Common.Test/WS.DomainModelling.Common.Test.csproj --configuration Release

      - name: Publish to NuGet
        run: dotnet nuget push WS.DomainModelling.Common/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
